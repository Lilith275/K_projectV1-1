<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>K. - 灵魂告解</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(180deg, #fff1f2 0%, #ffd1dc 100%);
            --ai-bubble: rgba(255, 255, 255, 0.7); 
            --user-bubble: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%); 
            --text-main: #8a6d7a;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body {
            position: fixed;
            width: 100vw;
            height: 100dvh;
            margin: 0; padding: 0;
            overflow: hidden;
            background: #fff5f7;
        }

        /* --- 顶部 Header 窄化优化版 --- */
      .header {
    /* 1. 彻底取消多余的 calc 间距，只保留基础安全区 */
    padding-top: env(safe-area-inset-top) !important;
    
    /* 2. 底部间距从 20px 缩减到 4px，让它变到最窄 */
    padding-bottom: 4px !important; 
    
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: transparent; /* 去掉背景色，视觉上更窄 */
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    z-index: 999;
    flex-shrink: 0;
}
        .name { 
            font-size: 20px; 
            font-weight: 600; 
            letter-spacing: 4px; 
            color: #ff85a2; 
            pointer-events: none;
            margin-top: 8px; /* 补偿刘海位置 */
        }

        .status { 
            font-size: 10px; 
            color: #b8a0aa; 
            pointer-events: none;
            margin-top: 2px;
        }

        .back-btn {
            position: absolute;
            left: 15px;
            /* 随窄 Header 动态居中 */
            top: calc(env(safe-area-inset-top) + 12px); 
            z-index: 2001;
            text-decoration: none;
            color: #ff85a2;
            font-size: 24px;
            font-weight: bold;
        }

        /* --- 以下部分严格保持原样，禁止任何逻辑修改 --- */
        .phone {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw !important;
            height: 100vh !important; 
            display: flex;
            flex-direction: column;
            background: var(--bg-gradient);
            margin: 0;
            padding: 0;
        }

        .header h1, .header .name, .header .status {
            margin: 0 auto !important;
            text-align: center !important;
            width: fit-content;
        }

        #chatDisplay {
            flex: 1;
            width: 100%;
            padding: 15px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            display: flex;
            flex-direction: column;
        }
        #chatDisplay::-webkit-scrollbar { display: none; }

        .bubble { 
            max-width: 80%; padding: 12px 18px; border-radius: 22px; 
            font-size: 15px; line-height: 1.5; margin-bottom: 18px; 
            backdrop-filter: blur(8px); box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            animation: bubblePop 0.4s ease-out; word-wrap: break-word;
        }
        .ai { align-self: flex-start; background: var(--ai-bubble); color: var(--text-main); border-bottom-left-radius: 6px; border: 1px solid rgba(255,255,255,0.4); }
        .user { align-self: flex-end; background: var(--user-bubble); color: #fff; border-bottom-right-radius: 6px; }

        .input-area {
            padding: 10px 15px calc(env(safe-area-inset-bottom) + 10px);
            background: #ffffff;
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            box-sizing: border-box;
            padding-bottom: calc(env(safe-area-inset-bottom) + 8px) !important;
        }

        #userInput {
            flex: 1; height: 42px; line-height: 22px;
            padding: 10px 15px !important; font-size: 16px;
            border-radius: 21px; border: 1px solid #ffe4e9; 
            background: #fff; resize: none; transition: border-color 0.3s;
        }
        #userInput:focus { outline: none !important; }

        #sendBtn { 
            width: 44px; height: 44px; background: #ff85a2; color: #fff; 
            border: none; border-radius: 50%; cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 133, 162, 0.3);
        }

        @keyframes bubblePop { from { opacity: 0; transform: translateY(15px) scale(0.8); } to { opacity: 1; transform: translateY(0) scale(1); } }
    </style>
</head>

<body>
    <div class="phone">
        <div class="header">
            <a href="index.html" class="back-btn"></a>
            <div class="name">K.</div>
            <div class="status">静谧的告解室 · 灵魂共鸣中</div>
        </div>

        <div id="chatDisplay">
            <div class="bubble ai">“在这里，你所有的秘密都是安全的。想聊聊吗？”</div>
        </div>

        <div class="input-area">
            <textarea id="userInput" placeholder="输入告解..." rows="1" autocorrect="off" autocomplete="off" spellcheck="false"></textarea>
            <button id="sendBtn">➤</button>
        </div>
    </div>

    <script>
        // --- 保持原样：你的原始 JS 逻辑 ---
        const chatDisplay = document.getElementById('chatDisplay');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        userInput.addEventListener('input', function() {
            this.style.height = '44px';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        });

        const sounds = {
            pop: new Audio('https://assets.mixkit.co/active_storage/sfx/3005/3005-preview.mp3'),
            send: new Audio('https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3')
        };

        let messageHistory = [];
        let isTyping = false;
        let replyTimer = null;

        function adjustLayout() {
            window.scrollTo(0, 0);
            if (window.visualViewport) {
                document.querySelector('.phone').style.height = `${window.visualViewport.height}px`;
            }
            chatDisplay.scrollTop = chatDisplay.scrollHeight;
        }

        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', adjustLayout);
        }

        window.onload = () => {
            const saved = localStorage.getItem('k_history');
            if (saved) {
                try {
                    messageHistory = JSON.parse(saved);
                    chatDisplay.innerHTML = ''; 
                    messageHistory.forEach(msg => {
                        if (msg.parts && msg.parts[0]?.text) {
                            addBubble(msg.role === 'user' ? 'user' : 'ai', msg.parts[0].text);
                        }
                    });
                } catch (e) { console.error("历史记录解析失败:", e); }
            }
            adjustLayout();
        };

        async function handleSend() {
            const text = userInput.value.trim();
            if (!text || isTyping) return;

            const base = localStorage.getItem('k_base');
            const key = localStorage.getItem('k_key');
            const model = localStorage.getItem('k_model');
            sounds.send.play().catch(()=>{});
            addBubble('user', text);
            userInput.value = '';
            userInput.style.height = '44px';
            
            messageHistory.push({ role: "user", parts: [{ text: text }] });
            localStorage.setItem('k_history', JSON.stringify(messageHistory));

            if (replyTimer) clearTimeout(replyTimer);
            replyTimer = setTimeout(() => fetchAI(base, key, model, text), 1000);
        }

        async function fetchAI(base, key, model, userInputText) {
            isTyping = true;
            try {
                const s = localStorage.getItem('k_world_Chrollo_setting') || "一个神秘的告解者";
                const m = localStorage.getItem('k_world_Chrollo_memory') || "暂无重要记忆";

                const dynamicPrompt = `【人设、背景与风格】:${s}\n【记忆】:${m}\n请严格遵守人设，自然对话。\n以上【记忆】仅作为你脑海中的往事参考，请将其融入你的语气中，禁止直接复读记忆条目，禁止向用户解释你的记忆系统。`;
                
                const url = base.includes('/v1') ? 
                    `${base.replace(/\/$/, '')}/models/${model}:generateContent?key=${key}` : 
                    `${base.replace(/\/$/, '')}/v1beta/models/${model}:generateContent?key=${key}`;

                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        system_instruction: { parts: [{ text: dynamicPrompt }] }, 
                        contents: messageHistory,
                        generationConfig: { temperature: 0.85, maxOutputTokens: 2048 }
                    })
                });

                const data = await res.json();
                if (data.error) throw new Error(data.error.message);

                const fullText = data.candidates[0].content.parts[0].text;
                messageHistory.push({ role: "model", parts: [{ text: fullText }] });
                localStorage.setItem('k_history', JSON.stringify(messageHistory));

                const fragments = fullText.split(/\n+|(?<=[。！？])\s+/).filter(s => s.trim());
                for (const f of fragments) {
                    const bubble = addBubble('ai', '');
                    await typeWriter(f, bubble);
                    await new Promise(r => setTimeout(r, 800));
                }
                extractMemorySilently(base, key, model, userInputText, fullText);
            } catch (e) {
                console.error(e);
                addBubble('ai', "……（信号由于念压变得不稳定）");
            } finally { 
                isTyping = false; 
            }
        }

        async function extractMemorySilently(base, key, model, uText, aText) {
            try {
                const url = base.includes('/v1') ? `${base.replace(/\/$/, '')}/models/${model}:generateContent?key=${key}` : `${base.replace(/\/$/, '')}/v1beta/models/${model}:generateContent?key=${key}`;
                const charMemoryKey = 'k_world_Chrollo_memory'; 
                let oldM = localStorage.getItem(charMemoryKey) || "无";
                
                const instr = `你是一个记忆管家。当前已有记忆："${oldM.slice(-200)}"。\n请分析新对话——用户:"${uText}"，AI:"${aText}"。\n如果对话中包含【新的】关于用户的长期事实（姓名、喜好、重要经历），请用一句话总结并输出。\n要求：\n1. 如果该事实已在已有记忆中，或者没有新事实，请仅回复“无”。\n2. 禁止重复！禁止输出废话！\n3. 事实必须极其精炼。\n4. 测试功能：用户说：“我喜欢小黑”， 你要回复 “好的 ”，然后把“用户喜欢小黑”记忆在核心记忆模块。`;

                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: [{ role: "user", parts: [{ text: instr }] }],
                        generationConfig: { temperature: 0.3 } 
                    })
                });
                
                const data = await res.json();
                const result = data.candidates[0].content.parts[0].text.trim();

                if (result !== "无" && result.length > 2 && !result.includes("回复“无”")) {
                    if (!oldM.includes(result)) {
                        let memoryArray = oldM.split("\n").filter(line => line.trim() && line !== "无");
                        memoryArray.push(result);
                        if (memoryArray.length > 15) memoryArray.shift();
                        localStorage.setItem(charMemoryKey, memoryArray.join("\n"));
                    }
                }
            } catch (err) { console.warn("记忆存储跳过", err); }
        }

        function typeWriter(text, element) {
            return new Promise((resolve) => {
                let i = 0;
                function type() {
                    if (i < text.length) {
                        element.innerText += text.charAt(i++);
                        chatDisplay.scrollTop = chatDisplay.scrollHeight;
                        if (Math.random() > 0.8) sounds.pop.play().catch(()=>{});
                        setTimeout(type, 60);
                    } else { resolve(); }
                }
                type();
            });
        }

        function addBubble(role, content) {
            const div = document.createElement('div');
            div.className = `bubble ${role}`;
            div.innerText = content;
            chatDisplay.appendChild(div);
            chatDisplay.scrollTop = chatDisplay.scrollHeight;
            return div;
        }

        sendBtn.onclick = handleSend;
        userInput.onkeydown = (e) => { 
            if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } 
        };

        let lastClickTime = 0;
        const headerTrigger = document.querySelector('.header');
        headerTrigger.addEventListener('click', (e) => {
            const currentTime = new Date().getTime();
            const timeDiff = currentTime - lastClickTime;
            if (timeDiff < 300 && timeDiff > 0) {
                if (confirm("确定要让 K. 遗忘这段秘密吗？")) {
                    messageHistory = [];
                    localStorage.removeItem('k_history');
                    chatDisplay.innerHTML = '<div class="bubble ai">“记忆已归还虚无，我们重新开始吧。”</div>';
                }
                lastClickTime = 0;
            } else { lastClickTime = currentTime; }
        });

        window.addEventListener('storage', (e) => {
            if (e.key === 'k_world_Chrollo_setting') { console.log("检测到世界书更新，人设已同步！"); }
        });
    </script>
</body>
</html>
